       /* Card container for multiple cards */
.card-container {
    display: flex;
    flex-wrap: wrap;
    gap: 20px;
    justify-content: center;
}

/* Individual card styling */
.card {
    background-color: #fff;
    border-radius: 12px;
    box-shadow: 0 6px 12px rgba(0,0,0,0.15);
    overflow: hidden;
    flex: 1 1 350px; /* Flexible width, min 350px */
    max-width: 500px; /* Bigger cards */
    transition: transform 0.2s ease;
}

/* Hover effect */
.card:hover {
    transform: translateY(-5px);
}

/* Card image */
.card img {
    width: 100%;
    height: auto;
    display: block;
}

/* Card content */
.card-content {
    padding: 20px;
}

.card-content h3 {
    margin: 0 0 12px;
    font-size: 1.5em; /* Bigger title */
}

.card-content p {
    color: #555;
    font-size: 1.05em; /* Slightly bigger text */
    line-height: 1.5;
}

/* Button styling */
.card-content a {
    display: inline-block;
    margin-top: 12px;
    padding: 10px 16px;
    background-color: #007BFF;
    color: white;
    text-decoration: none;
    border-radius: 6px;
    font-size: 1em;
}

.card-content a:hover {
    background-color: #0056b3;
}

    .card {
        max-width: 95%; /* Take most of the screen width */
    }
    </style>
